on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: If true, pushes image to container registry

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need this to get version number from last tag
          fetch-depth: 0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and export to Docker local cache
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          # Need load and tags so we can test it below
          load: true
          tags: tag_for_testing

      - name: Test cli works in cached runtime image
        run: docker run --rm tag_for_testing --version

      - name: Create tags for publishing image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Push cached image to container registry
        if: inputs.publish && github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        # This does not build the image again, it will find the image in the
        # Docker cache and publish it
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      ###############################
      # BlueAPI Container Image Build
      ###############################
      
      - name: Build and export Dockerfile.blueapi to local cache
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: true
        with:
          context: .
          file: Dockerfile.blueapi
          load: true
    
      - name: Create tags for publishing BlueAPI image
        id: meta-blueapi
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-blueapi
          labels: |
            org.opencontainers.image.title=spectroscopy-bluesky-blueapi
            org.opencontainers.image.description=BlueAPI plans, stubs and utilities for spectroscopy beamlines
          annotations: |
            org.opencontainers.image.title=spectroscopy-bluesky-blueapi
            org.opencontainers.image.description=BlueAPI plans, stubs and utilities for spectroscopy beamlines
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Push cached BlueAPI image to container registry
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: Dockerfile.blueapi
          push: true
          tags: ${{ steps.meta-blueapi.outputs.tags }}
          labels: ${{ steps.meta-blueapi.outputs.labels }}
          # Set the annotations to make the description appear in the GH repo page
          annotations: ${{ steps.meta-blueapi.outputs.annotations }}
